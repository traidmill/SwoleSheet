                state.editingSetNr = null;
                render();
              })
              .withFailureHandler(function (err) {
                toast('Kunde inte ta bort: ' + (err && err.message ? err.message : err), 'error');
              })
              .deleteSet({
                passId: state.activeSession.passId,
                övning: ex.övning,
                setNr: delNr
              });
          }
        );
      };

      const doneBtn = form.querySelector('#done');
      if (doneBtn) doneBtn.onclick = function () { state.view = 'passDetailActive'; render(); };

      reg.appendChild(form);
      parent.appendChild(reg);
      updateLive();
    }

    function renderPassSummary(parent) {
      const s = state.summary;
      if (!s) { state.view = 'passList'; render(); return; }

      const volumePart = s.totalVolume > 0
        ? '<div><div class="summary-stat-value num">' + esc(fmtVolume(s.totalVolume)) + '</div><div class="summary-stat-label">kg total</div></div>'
        : '';
      const prStyle = s.prs.length > 0 ? ' style="color:var(--accent)"' : '';

      parent.appendChild(el(
        '<div class="summary-card">' +
          '<div class="summary-icon" aria-hidden="true">✓</div>' +
          '<div class="summary-name">' + esc(s.pass) + '</div>' +
          '<div class="summary-time num">' + s.duration + ' min · avslutat ' + esc(fmtTime(s.endedAt)) + '</div>' +
          '<div class="summary-stats">' +
            '<div><div class="summary-stat-value num">' + s.totalSets + '</div><div class="summary-stat-label">Set</div></div>' +
            volumePart +
            '<div><div class="summary-stat-value num"' + prStyle + '>' + s.prs.length + '</div><div class="summary-stat-label">PR</div></div>' +
          '</div>' +
        '</div>'
      ));

      appendPRList(parent, s.prs);

      const btn = el('<button class="btn">Tillbaka till listan</button>');
      btn.onclick = function () {
        state.summary = null;
        state.view = 'passList';
        render();
      };
      parent.appendChild(btn);
    }

    function histDurationMin(it) {
      if (!it.startTime || !it.endTime) return null;
      const m = Math.round((new Date(it.endTime) - new Date(it.startTime)) / 60000);
      return m > 0 ? m : null;
    }

    function renderHistory(parent) {
      const back = el('<button class="btn-back">‹ Tillbaka</button>');
      back.onclick = function () { history.back(); };
      parent.appendChild(back);

      const all = state.history;
      const loading = all === null || all === undefined;
      const items = loading ? [] : all.filter(function (it) {
        return !state.historyFilter || it.pass === state.historyFilter;
      });

      const eyebrow = state.historyFilter
        ? esc(state.historyFilter)
        : 'Logg' + (loading ? '' : ' · ' + items.length + ' pass');
      parent.appendChild(el(
        '<div class="screen-head" style="margin-top:10px">' +
          '<div class="eyebrow dim">' + eyebrow + '</div>' +
          '<div class="screen-title">Historik</div>' +
        '</div>'
      ));

      if (state.historyFilter) {
        const chip = el('<button class="btn-back" style="margin:-6px 0 10px">✕ Visar endast ' + esc(state.historyFilter) + ' — visa alla</button>');
        chip.onclick = function () { state.historyFilter = null; render(); };
        parent.appendChild(chip);
      }

      if (loading) {
        parent.appendChild(el('<div class="stat-card" aria-busy="true"><div class="stat-card-row">' + skBar('45%', '0.85rem') + '</div></div>'));
        parent.appendChild(el(
          '<div class="xlist" aria-busy="true">' +
            '<div class="xlist-label" style="margin-top:14px">' + skBar('40%', '0.7rem') + '</div>' +
            skRows(5) +
          '</div>'
        ));
        return;
      }
      if (items.length === 0) {
        parent.appendChild(el('<div class="empty">Inga avslutade pass ännu.</div>'));
        return;
      }

      // Summering överst: antal pass + total volym
      const totalVolume = items.reduce(function (sum, it) { return sum + (it.volume || 0); }, 0);
      parent.appendChild(el(
        '<div class="stat-card">' +
          '<div class="stat-card-row">' +
            '<span class="stat-card-label">' + items.length + ' avslutade pass</span>' +
            (totalVolume > 0 ? '<span class="stat-card-value num">' + esc(fmtVolume(totalVolume)) + ' kg</span>' : '') +
          '</div>' +
        '</div>'
      ));

      // Veckogrupperad lista, nyast först (items är redan sorterade från servern)
      const list = el('<div class="xlist"></div>');
      let curMonday = null;
      items.forEach(function (it) {
        const mon = mondayOf(it.date);
        if (mon !== curMonday) {
          curMonday = mon;
          list.appendChild(el(
            '<div class="xlist-label" style="margin-top:14px">Vecka ' + isoWeekNum(mon) + ' · ' + esc(fmtWeekRange(mon)) + '</div>'
          ));
        }
        const subParts = [it.setCount + ' set'];
        if (it.volume > 0) subParts.push(fmtVolume(it.volume) + ' kg');
        const dur = histDurationMin(it);
        if (dur !== null) subParts.push(dur + ' min');
        const row = el(
          '<div class="xrow">' +
            '<div class="xedge"></div>' +
            '<div class="xmain">' +
              '<div class="xname-row"><span class="xname">' + esc(it.pass) + '</span></div>' +
              '<div class="xsub num">' + esc(subParts.join(' · ')) + '</div>' +
            '</div>' +
            '<span class="pcard-tag">' + esc(fmtDateMini(it.date)) + '</span>' +
            '<span class="xchev" aria-hidden="true">›</span>' +
          '</div>'
        );
        makeActionable(row, function () { openSessionDetail(it); });
        list.appendChild(row);
      });
      parent.appendChild(list);
    }

    function renderSessionDetail(parent) {
      const it = state.sessionItem;
      if (!it) { state.view = 'history'; render(); return; }

      const back = el('<button class="btn-back">‹ Historik</button>');
      back.onclick = function () { history.back(); };
      parent.appendChild(back);

      const g = passGhost(it.pass);
      if (g) parent.appendChild(el('<div class="ghost-num" aria-hidden="true">' + g + '</div>'));

      const timeSub = (it.startTime && it.endTime)
        ? '<div class="screen-sub num">' + esc(fmtTime(it.startTime)) + '–' + esc(fmtTime(it.endTime)) + '</div>'
        : '';
      parent.appendChild(el(
        '<div class="screen-head" style="margin-top:10px">' +
          '<div class="eyebrow green">Avslutat pass · ' + esc(fmtDateMini(it.date)) + '</div>' +
          '<div class="screen-title">' + esc(it.pass) + '</div>' +
          timeSub +
        '</div>'
      ));

      // Stora siffror: volym · set · min (samma mönster som Förra gången-kortet)
      const stats = [];
      if (it.volume > 0) {
        stats.push('<div><div class="v green num">' + esc(fmtVolume(it.volume)) + '</div><div class="l">kg volym</div></div>');
      }
      stats.push('<div><div class="v num">' + it.setCount + '</div><div class="l">set</div></div>');
      const dur = histDurationMin(it);
      if (dur !== null) {
        stats.push('<div><div class="v num">' + dur + '</div><div class="l">min</div></div>');
      }
      parent.appendChild(el('<div class="stat-card"><div class="stats3">' + stats.join('') + '</div></div>'));

      const detail = state.sessionDetailCache[histId(it)];
      const xlist = el('<div class="xlist"><div class="xlist-label">Övningar</div></div>');
      if (detail === null || detail === undefined) {
        xlist.setAttribute('aria-busy', 'true');
        xlist.innerHTML += skRows(4);
        parent.appendChild(xlist);
        return;
      }

      const sbe = detail.setsByExercise || {};
      const prs = detail.prs || [];
      const exNames = Object.keys(sbe);
      // Nyckelordningen ur servern = i vilken ordning seten loggades — sortera
      // enligt programmets övningsordning; utgångna övningar hamnar sist.
      const progIdx = passIdxByName(it.pass);
      if (progIdx >= 0) {
        const order = {};
        state.program[progIdx].exercises.forEach(function (ex, i) { order[ex.övning] = i; });
        exNames.sort(function (a, b) {
          return ((a in order) ? order[a] : 999) - ((b in order) ? order[b] : 999);
        });
      }
      if (exNames.length === 0) {
        xlist.appendChild(el('<div class="empty">Inga loggade set hittades.</div>'));
      }
      exNames.forEach(function (övn) {
        const sets = sbe[övn];
        const hasPR = prs.some(function (p) { return p.övning === övn; });
        xlist.appendChild(el(
          '<div class="xrow" style="cursor:default">' +
            '<div class="xedge"></div>' +
            '<div class="xmain">' +
              '<div class="xname-row"><span class="xname">' + esc(övn) + '</span>' +
                (hasPR ? '<span class="pr-pill">PR</span>' : '') + '</div>' +
              '<div class="xsub num">' + esc(compressSets(sets)) + '</div>' +
            '</div>' +
          '</div>'
        ));
        sets.forEach(function (s) {
          if (s.kommentar) {
            xlist.appendChild(el(
              '<div class="sg-comment"><span class="pen">✎</span><span class="txt">”Set ' + s.setNr + ': ' + esc(s.kommentar) + '”</span></div>'
            ));
          }
        });
      });
      parent.appendChild(xlist);

      appendPRList(parent, prs);
    }

    // --- init ---

    function init() {
      state.view = 'loading';
      state.todayStr = todayStr();
      state.completedByPassId = {};
      state.lastSessionByPass = {};
      state.exerciseHistoryByPass = {};
      state.passLastDate = {};
      state.weekDoneByPass = null;
      state.weekVolume = 0;
      state.weekStart = '';
      state.activeSession = null;
      state.modal = null;
      state.summary = null;
      render();

      // Allt uppstartsdata i ett anrop — varje anrop kostar en kallstart.
      google.script.run
        .withSuccessHandler(function (d) {
          state.programs = d.programs || [];
          state.activeProgram = d.activeProgram || null;
          state.program = d.program;
          state.weeks = d.weeks || [1];
          state.currentWeek = d.currentWeek || 1;
          state.activeSession = d.activeSession || null;
          const st = d.listStats || {};
          state.passLastDate = st.lastDateByPass || {};
          state.weekDoneByPass = st.weekDoneByPass || null;
          state.weekVolume = st.weekVolume || 0;
          state.weekStart = st.weekStart || '';
          if (state.activeSession) {
            // En pågående session styr aktivt program och hoppar direkt in i passet.
            if (state.activeSession.program) state.activeProgram = state.activeSession.program;
            state.completedByPassId[state.activeSession.passId] = d.completedSets || {};
            const idx = passIdxByName(state.activeSession.pass);
            if (idx >= 0) {
              state.selectedPassIdx = idx;
              state.view = 'passDetailActive';
            } else {
              state.view = 'passList';
            }
          } else if (state.programs.length === 1) {
            // Ett enda program → hoppa över programlistan, gå rakt till veckans pass.
            state.view = 'passList';
          } else {
            state.view = 'programList';
          }
          render();
        })
        .withFailureHandler(function (err) {
          state.view = 'error';
          state.errorMsg = (err && err.message) ? err.message : String(err);
          render();
        })
        .getInitData();
    }

    window.addEventListener('DOMContentLoaded', function () {
      try { history.pushState({ ss: 1 }, ''); } catch (e) {}
      init();
    });
  </script>
