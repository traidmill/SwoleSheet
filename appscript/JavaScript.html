  <script>
    const state = {
      view: 'loading',
      programs: [],               // [{ name, sheetName, passCount }]
      activeProgram: null,        // visningsnamn för valt program
      switchingProgram: null,     // namn på program som laddas vid byte, annars null
      weeks: [1],                 // tillgängliga veckor i aktivt program
      currentWeek: 1,             // vald vecka (vecko-progression)
      changingWeek: false,        // true medan veckobyte laddar
      program: null,
      passLastDate: {},
      weekDoneByPass: null,       // klart per pass för vald PROGRAMVECKA (null = kalendervecka gäller)
      weekVolume: 0,
      weekStart: '',
      activeSession: null,
      completedByPassId: {},
      lastSessionByPass: {},
      pendingPassLoads: {},
      selectedPassIdx: -1,
      selectedExerciseIdx: -1,
      currentSetNr: 1,
      editingSetNr: null,        // setNr som redigeras i övningsvyn, annars null
      exerciseHistoryByPass: {},
      saving: false,
      starting: false,
      ending: false,
      canceling: false,
      todayStr: '',
      errorMsg: '',
      modal: null,
      summary: null,
      history: undefined,        // undefined = ej hämtad, null = laddar, [] = klar
      historyFilter: null,       // passnamn eller null (alla)
      historyOrigin: 'passList', // 'passList' | 'passDetailIdle' — för backnavigering
      historyScroll: 0,          // scrollposition att återställa vid retur från detalj
      sessionItem: null,         // list-item som öppnats i detaljvyn
      sessionDetailCache: {},    // histId(item) -> {setsByExercise, prs} | null (laddar)
      knownExercises: null       // cache: kända övningsnamn för autocomplete (null = ej hämtad)
    };

    function todayStr() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function el(html) { const w = document.createElement('div'); w.innerHTML = html.trim(); return w.firstElementChild; }

    // Gör en klickbar div åtkomlig med tangentbord/skärmläsare: knapp-roll,
    // fokuserbar, Enter/Space aktiverar samma handler som klick.
    function makeActionable(elem, handler, label) {
      elem.setAttribute('role', 'button');
      elem.setAttribute('tabindex', '0');
      if (label) elem.setAttribute('aria-label', label);
      elem.onclick = handler;
      elem.onkeydown = function (e) {
        if (e.target !== elem) return; // nästlade knappar (t.ex. ⋯) sköter sig själva
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(e); }
      };
    }
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function fmtNum(n) {
      if (n === null || n === undefined || n === '') return '';
      return String(n).replace('.', ',');
    }
    function parseNum(str) {
      if (str === '' || str == null) return null;
      const n = Number(String(str).replace(',', '.'));
      return isNaN(n) ? null : n;
    }
    // Första heltalet ur ett reps-mål ("8" → "8", "8-10" → "8", "" → ""). Reps-fältet
    // tar bara siffror (maxlength 3), så intervall förifylls med sin nedre gräns.
    function firstRepNum(reps) {
      if (reps === null || reps === undefined) return '';
      const m = String(reps).match(/\d+/);
      return m ? m[0] : '';
    }
    function daysSince(dateStr) {
      if (!dateStr) return null;
      const today = new Date(state.todayStr + 'T00:00:00');
      const then = new Date(dateStr + 'T00:00:00');
      return Math.round((today - then) / 86400000);
    }
    const MONTHS_SHORT = ['jan', 'feb', 'mar', 'apr', 'maj', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];
    function fmtDateMini(dateStr) {
      if (!dateStr) return '';
      const d = daysSince(dateStr);
      if (d === 0) return 'idag';
      if (d === 1) return 'igår';
      const dt = new Date(dateStr + 'T00:00:00');
      return dt.getDate() + ' ' + MONTHS_SHORT[dt.getMonth()];
    }
    function mondayOf(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const m = new Date(d.getTime() - ((d.getDay() + 6) % 7) * 86400000);
      return m.getFullYear() + '-' + String(m.getMonth() + 1).padStart(2, '0') + '-' + String(m.getDate()).padStart(2, '0');
    }
    function mondayOfToday() { return mondayOf(state.todayStr); }
    function weekStartStr() { return state.weekStart || mondayOfToday(); }
    function isoWeekNum(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dayNum = date.getUTCDay() || 7;
      date.setUTCDate(date.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
      return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
    }
    function fmtWeekRange(mondayStr) {
      const mon = new Date(mondayStr + 'T00:00:00');
      const sun = new Date(mon.getTime() + 6 * 86400000);
      if (mon.getMonth() === sun.getMonth()) {
        return mon.getDate() + '–' + sun.getDate() + ' ' + MONTHS_SHORT[mon.getMonth()];
      }
      return mon.getDate() + ' ' + MONTHS_SHORT[mon.getMonth()] + ' – ' + sun.getDate() + ' ' + MONTHS_SHORT[sun.getMonth()];
    }
    function isDoneThisWeek(passName) {
      // Veckoprogression: klart = avslutad session för vald programvecka (Sessions
      // är sanningen). Annars: senast loggad denna kalendervecka.
      if (state.weekDoneByPass) return !!state.weekDoneByPass[passName];
      const d = state.passLastDate[passName];
      return !!d && d >= weekStartStr();
    }
    function passGhost(passName) {
      const m = String(passName).match(/\d+/);
      return m ? String(Math.min(Number(m[0]), 99)).padStart(2, '0') : '';
    }
    function refreshListStats() {
      google.script.run
        .withSuccessHandler(function (st) {
          st = st || {};
          state.passLastDate = st.lastDateByPass || {};
          state.weekDoneByPass = st.weekDoneByPass || null;
          state.weekVolume = st.weekVolume || 0;
          state.weekStart = st.weekStart || '';
          render();
        })
        .withFailureHandler(function (err) {
          // Bakgrundsuppdatering — visa felet men lämna befintlig statistik orörd
          toast('Kunde inte uppdatera statistik: ' + (err && err.message ? err.message : err), 'error');
        })
        .getListStats(state.activeProgram);
    }
    function fmtElapsed(isoStr) {
      const sec = Math.max(0, Math.floor((new Date() - new Date(isoStr)) / 1000));
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      const mm = String(m).padStart(2, '0'), ss = String(s).padStart(2, '0');
      return h > 0 ? h + ':' + mm + ':' + ss : mm + ':' + ss;
    }
    function fmtSetShort(s) {
      const w = (s.vikt === null || s.vikt === undefined || s.vikt === '') ? '' : ' × ' + fmtNum(s.vikt);
      return String(s.reps) + w;
    }
    function fmtTime(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }
    function viktSuffix(v) {
      if (v === null || v === undefined || v === '') return '';
      return ' @ ' + fmtNum(v) + ' kg';
    }
    function compressSets(sets) {
      if (!sets || sets.length === 0) return '';
      const repsList = sets.map(function (s) { return String(s.reps); });
      const viktList = sets.map(function (s) { return s.vikt == null ? '' : String(s.vikt); });
      const allSameReps = repsList.every(function (r) { return r === repsList[0]; });
      const allSameVikt = viktList.every(function (v) { return v === viktList[0]; });
      const anyNullVikt = sets.some(function (s) { return s.vikt == null; });
      if (allSameReps && allSameVikt) {
        return sets.length + '×' + sets[0].reps + viktSuffix(sets[0].vikt);
      }
      if (allSameVikt) return repsList.join(', ') + viktSuffix(sets[0].vikt);
      if (allSameReps && !anyNullVikt) {
        return sets[0].reps + ' @ ' + sets.map(function (s) { return fmtNum(s.vikt); }).join(', ') + ' kg';
      }
      const groups = [];
      sets.forEach(function (s) {
        const last = groups[groups.length - 1];
        const sameVikt = last && (last.vikt == null ? s.vikt == null : String(last.vikt) === String(s.vikt));
        if (last && String(last.reps) === String(s.reps) && sameVikt) {
          last.count++;
        } else {
          groups.push({ reps: s.reps, vikt: s.vikt, count: 1 });
        }
      });
      const fmtGroup = function (g) { return g.count > 1 ? g.count + '×' + g.reps : String(g.reps); };
      if (!anyNullVikt) {
        return groups.map(function (g) { return fmtGroup(g) + ' @ ' + fmtNum(g.vikt); }).join(', ') + ' kg';
      }
      return groups.map(function (g) {
        return g.vikt == null ? fmtGroup(g) : fmtGroup(g) + ' @ ' + fmtNum(g.vikt) + ' kg';
      }).join(', ');
    }
    function getCompletedFor(övning) {
      if (!state.activeSession) return [];
      const data = state.completedByPassId[state.activeSession.passId];
      if (!data) return [];
      return data[övning] || [];
    }
    function sessionScore(sets) {
      if (!sets || sets.length === 0) return 0;
      return sets.reduce(function (sum, s) {
        const w = (s.vikt === null || s.vikt === undefined || s.vikt === '') ? 1 : Number(s.vikt) || 1;
        return sum + (Number(s.reps) || 0) * w;
      }, 0);
    }
    // --- segment-hjälpare (en övning kan ha flera viktsegment, t.ex. topp + back-off) ---
    function exSegments(ex) {
      return (ex.segments && ex.segments.length)
        ? ex.segments
        : [{ set: ex.set, reps: ex.reps, målvikt: ex.målvikt, rir: ex.rir, notering: ex.notering }];
    }
    // Segmentet som täcker 1-baserat set n (fallback sista segmentet för "extra" set).
    function segForSet(ex, n) {
      const segs = exSegments(ex);
      let acc = 0;
      for (let i = 0; i < segs.length; i++) {
        acc += segs[i].set || 0;
        if (n <= acc) return segs[i];
      }
      return segs[segs.length - 1];
    }
    // Kompakt sammanfattning: "1×5 + 3×8" eller "10×10".
    function segSummary(ex) {
      return exSegments(ex).map(function (s) {
        return (s.reps === null || s.reps === undefined || s.reps === '') ? (s.set + ' set') : (s.set + '×' + s.reps);
      }).join(' + ');
    }
    // Måltext för ett segment: "set × reps @ vikt kg · RIR n" (rå text, esc:as vid utskrift).
    function segTarget(s) {
      let t = s.set + ' × ' + s.reps;
      if (s.målvikt !== null && s.målvikt !== undefined && s.målvikt !== '') t += ' @ ' + fmtNum(s.målvikt) + ' kg';
      if (s.rir !== null && s.rir !== undefined && s.rir !== '') t += ' · RIR ' + s.rir;
      return t;
    }
    function fmtVolume(n) {
      if (!n || n === 0) return '0';
      return Math.round(n).toLocaleString('sv-SE');
    }
    function trendHTML(curScore, prevScore) {
      if (prevScore === null || prevScore === undefined) return '';
      if (curScore > prevScore) return ' <span class="trend up">↑</span>';
      if (curScore < prevScore) return ' <span class="trend down">↓</span>';
      return ' <span class="trend eq">=</span>';
    }

    function toast(msg, kind) {
      const t = document.createElement('div');
      t.className = 'toast' + (kind === 'error' ? ' error-toast' : kind === 'success' ? ' success-toast' : '');
      t.setAttribute('role', kind === 'error' ? 'alert' : 'status');
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(function () { t.classList.add('show'); });
      setTimeout(function () { t.classList.remove('show'); setTimeout(function () { t.remove(); }, 250); }, 1700);
    }

    function showModal(title, text, confirmLabel, confirmKind, onConfirm) {
      state.modal = { title: title, text: text, confirmLabel: confirmLabel, confirmKind: confirmKind, onConfirm: onConfirm };
      render();
    }
    function closeModal() { try { history.back(); } catch (e) { state.modal = null; render(); } }

    // Modal med textfält. onConfirm(value) anropas med trimmat, icke-tomt värde.
    function showInputModal(title, text, placeholder, confirmLabel, onConfirm) {
      state.modal = {
        title: title, text: text, confirmLabel: confirmLabel, confirmKind: 'accent',
        onConfirm: onConfirm,
        input: { placeholder: placeholder, value: '', datalist: state.knownExercises || [] }
      };
      render();
      // Ladda kända övningsnamn för autocomplete (en gång). Patcha datalist:en i DOM
      // direkt — ett nytt render() här skulle nolla det användaren hunnit skriva.
      if (state.knownExercises === null && typeof google !== 'undefined') {
        google.script.run.withSuccessHandler(function (names) {
          state.knownExercises = names || [];
          if (state.modal && state.modal.input) {
            state.modal.input.datalist = state.knownExercises;
            const dl = document.getElementById('modalDatalist');
            const inp = document.getElementById('modalInput');
            if (dl) dl.innerHTML = state.knownExercises.map(function (n) { return '<option value="' + esc(n) + '"></option>'; }).join('');
            else if (inp) { // datalist fanns inte vid första render (tom lista) — skapa och koppla
              const nd = document.createElement('datalist');
              nd.id = 'modalDatalist';
              nd.innerHTML = state.knownExercises.map(function (n) { return '<option value="' + esc(n) + '"></option>'; }).join('');
              inp.setAttribute('list', 'modalDatalist');
              inp.parentNode.insertBefore(nd, inp.nextSibling);
            }
          }
        }).getKnownExercises();
      }
    }

    // --- per-pass-ändringar: byt/lägg till övning för enstaka session ---
    function sessionMods() {
      return (state.activeSession && state.activeSession.mods) || { subs: {}, added: [] };
    }
    function ensureModsObj() {
      if (!state.activeSession.mods) state.activeSession.mods = { subs: {}, added: [] };
      if (!state.activeSession.mods.subs) state.activeSession.mods.subs = {};
      if (!state.activeSession.mods.added) state.activeSession.mods.added = [];
      return state.activeSession.mods;
    }
    function saveMods() {
      if (!state.activeSession || typeof google === 'undefined') return;
      google.script.run
        .withFailureHandler(function () { toast('Kunde inte spara ändringen', 'error'); })
        .setSessionMods(state.activeSession.passId, sessionMods());
    }
    // Planerade övningar + sessionens byten/tillägg → listan som renderas.
    function effectiveExercises(pass) {
      const mods = sessionMods();
      const subs = mods.subs || {};
      const out = pass.exercises.map(function (ex) {
        const to = subs[ex.övning];
        if (!to) return ex;
        // Substitut: behåll set/reps-schema men nolla vikt/RIR (annan övning, fritt mål).
        const segs = exSegments(ex).map(function (s) {
          return { set: s.set, reps: s.reps, målvikt: null, rir: null, notering: '' };
        });
        return {
          övning: to, ordning: ex.ordning, set: ex.set, reps: ex.reps,
          målvikt: null, rir: null, notering: '', segments: segs, _subFrom: ex.övning
        };
      });
      (mods.added || []).forEach(function (name, i) {
        out.push({
          övning: name, ordning: 9000 + i, set: 3, reps: '',
          målvikt: null, rir: null, notering: '',
          segments: [{ set: 3, reps: '', målvikt: null, rir: null, notering: '' }],
          _adhoc: true
        });
      });
      return out;
    }
    // Byt en (effektiv) övning mot en annan – bara denna session.
    function promptSubstitute(ex) {
      if (getCompletedFor(ex.övning).length > 0) { toast('Du har redan loggat set här', 'error'); return; }
      const key = ex._subFrom || ex.övning; // byt alltid mot den planerade övningens nyckel
      showInputModal('Byt övning', 'Ersätter ' + (ex._subFrom || ex.övning) + ' detta pass.', 'Ny övning…', 'Byt', function (name) {
        const m = ensureModsObj();
        m.subs[key] = name;
        saveMods(); closeModal();
      });
    }
    function undoSubstitute(ex) {
      if (!ex._subFrom) return;
      if (getCompletedFor(ex.övning).length > 0) { toast('Töm loggade set först', 'error'); return; }
      const m = ensureModsObj();
      delete m.subs[ex._subFrom];
      saveMods(); render();
    }
    function promptAddExercise() {
      showInputModal('Lägg till övning', 'Läggs till detta pass.', 'Övningens namn…', 'Lägg till', function (name) {
        const m = ensureModsObj();
        if (m.added.indexOf(name) < 0) m.added.push(name);
        saveMods(); closeModal();
      });
    }
    function removeAddedExercise(ex) {
      if (getCompletedFor(ex.övning).length > 0) { toast('Töm loggade set först', 'error'); return; }
      const m = ensureModsObj();
      const i = m.added.indexOf(ex.övning);
      if (i >= 0) m.added.splice(i, 1);
      saveMods(); render();
    }

    function _handleBack() {
      if (state.modal) { state.modal = null; render(); return true; }
      if (state.view === 'sessionDetail') {
        state.view = 'history'; render();
        window.scrollTo(0, state.historyScroll || 0);
        return true;
      }
      if (state.view === 'history') {
        state.view = (state.historyOrigin === 'passDetailIdle' && state.program[state.selectedPassIdx])
          ? 'passDetailIdle' : 'passList';
        render(); return true;
      }
      if (state.view === 'passSummary') { state.summary = null; state.view = 'passList'; render(); return true; }
      if (state.view === 'exercise') { state.view = 'passDetailActive'; render(); return true; }
      if (state.view === 'passDetailIdle' || state.view === 'passDetailActive') {
        state.view = 'passList'; render(); return true;
      }
      if (state.view === 'passList') {
        // Tillbaka till programlistan om det finns mer än ett program att välja mellan.
        if (state.programs && state.programs.length > 1) {
          state.view = 'programList'; render(); return true;
        }
        return false;
      }
      return false;
    }
    window.addEventListener('popstate', function () {
      if (_handleBack()) {
        try { history.pushState({ ss: 1 }, ''); } catch (e) {}
      }
    });

    function ensureLastSessionLoaded(passName) {
      if (state.lastSessionByPass[passName] !== undefined) return;
      state.lastSessionByPass[passName] = null;
      google.script.run
        .withSuccessHandler(function (s) { state.lastSessionByPass[passName] = s || false; render(); })
        .withFailureHandler(function () { state.lastSessionByPass[passName] = false; render(); })
        .getLastSessionForPass(passName, state.activeProgram);
    }

    // Förladdar historik för passets alla övningar i ett anrop —
    // övningsvyn kan då öppnas direkt utan nätverksväntan.
    function ensureExerciseHistoryLoaded(passName) {
      if (state.exerciseHistoryByPass[passName] !== undefined) return;
      state.exerciseHistoryByPass[passName] = null;
      google.script.run
        .withSuccessHandler(function (m) { state.exerciseHistoryByPass[passName] = m || {}; render(); })
        .withFailureHandler(function () { state.exerciseHistoryByPass[passName] = {}; render(); })
        .getPrevSessionsForPass(passName, 5, state.activeProgram);
    }

    function histId(it) { return it.passId ? 'p:' + it.passId : 'l:' + it.date + '|' + it.pass; }

    function ensureHistoryLoaded() {
      if (state.history !== undefined) return;
      state.history = null;
      google.script.run
        .withSuccessHandler(function (items) { state.history = items || []; render(); })
        .withFailureHandler(function () { state.history = []; toast('Kunde inte hämta historik', 'error'); render(); })
        .getHistory(200, state.activeProgram);
    }

    function openHistory(filterPass, origin) {
      state.historyFilter = filterPass || null;
      state.historyOrigin = origin;
      state.historyScroll = 0;
      state.view = 'history';
      render();
      ensureHistoryLoaded();
    }

    function openSessionDetail(item) {
      state.sessionItem = item;
      state.historyScroll = window.scrollY || 0;
      state.view = 'sessionDetail';
      render();
      const id = histId(item);
      if (state.sessionDetailCache[id] !== undefined) return;
      state.sessionDetailCache[id] = null;
      const key = item.passId ? { passId: item.passId } : { datum: item.date, pass: item.pass };
      google.script.run
        .withSuccessHandler(function (d) { state.sessionDetailCache[id] = d || { setsByExercise: {}, prs: [] }; render(); })
        .withFailureHandler(function () { state.sessionDetailCache[id] = { setsByExercise: {}, prs: [] }; toast('Kunde inte hämta passet', 'error'); render(); })
        .getSessionDetail(key);
    }

    function passIdxByName(name) {
      if (!state.program) return -1;
      for (let i = 0; i < state.program.length; i++) if (state.program[i].pass === name) return i;
      return -1;
    }

    // --- view rendering ---

    // --- skeleton-platshållare ---
    // Återanvänder de riktiga layoutbehållarna (stat-card, xrow, sg-row, pcard)
    // så att platshållaren har exakt samma höjd som det laddade innehållet —
    // då hoppar inte sidan när datan kommer.
    function skBar(w, h, mt) {
      return '<div class="skeleton" aria-hidden="true" style="width:' + w + ';height:' + (h || '0.85rem') +
        (mt ? ';margin-top:' + mt : '') + '"></div>';
    }
    // Maskerad riktig text: samma typsnitt/radhöjd som laddat innehåll ⇒ ingen höjdskillnad.
    function skMask(txt) { return '<span class="sk-mask" aria-hidden="true">' + txt + '</span>'; }
    // Lista med övnings-/historikrader i xlist-format.
    function skRows(n) {
      let h = '';
      for (let i = 0; i < n; i++) {
        h += '<div class="xrow" aria-hidden="true">' +
          '<div class="xedge"></div>' +
          '<div class="xmain">' + skBar('55%', '1.05rem') + skBar('38%', '0.75rem', '7px') + '</div>' +
        '</div>';
      }
      return h;
    }
    // Kompakt "förra gången"-rad: speglar den laddade raden (samma klasser +
    // maskerad text) så höjden blir identisk per konstruktion.
    function skLastStrip() {
      return '<div class="last-wrap" aria-busy="true">' +
          '<div class="last-strip" style="cursor:default">' +
            '<span>' + skMask('Förra · 00 aaa') + '</span>' +
            '<span class="vals num">' + skMask('0 000 kg · 00 set · 00 min') + '</span>' +
            '<span class="chev" aria-hidden="true">›</span>' +
          '</div>' +
          '<div class="skeleton" aria-hidden="true" style="width:32px;height:32px;border-radius:8px;flex-shrink:0"></div>' +
        '</div>';
    }
    // Hela startskärmen (programlistan): rubrik + några programkort.
    function renderLoadingSkeleton(parent) {
      parent.appendChild(el(
        '<div class="screen-head">' +
          '<div class="eyebrow dim">' + skBar('35%', '0.7rem') + '</div>' +
          '<div style="margin-top:5px">' + skBar('60%', '40px') + '</div>' +
        '</div>'
      ));
      for (let i = 0; i < 3; i++) {
        parent.appendChild(el(
          '<div class="pcard' + (i === 0 ? ' today' : ' upcoming') + '" aria-hidden="true">' +
            '<div class="pcard-edge"></div>' +
            '<div class="pcard-body">' +
              '<div class="pcard-top">' + skBar('35%', '0.7rem') + '</div>' +
              '<div style="margin-top:6px">' + skBar('55%', '22px') + '</div>' +
              '<div style="margin-top:8px">' + skBar('45%', '0.7rem') + '</div>' +
            '</div>' +
          '</div>'
        ));
      }
    }

    // Sekundticker för "Pass pågår"-pillen; rensas vid varje omrendering.
    let timerInt = null;

    // Topprad med tillbaka-knapp + "Pass pågår"-pill med tickande tid.
    // Delas av det aktiva passet och övningsvyn (identisk markup + ticker).
    function appendSessionTopbar(parent) {
      const topbar = el(
        '<div class="ex-topbar">' +
          '<button class="btn-back">‹ Tillbaka</button>' +
          '<span class="session-pill">' +
            '<span class="dot"></span>' +
            '<span class="pill-label">Pass pågår</span>' +
            '<span class="pill-timer num" id="pillTimer">' + esc(fmtElapsed(state.activeSession.startTime)) + '</span>' +
          '</span>' +
        '</div>'
      );
      topbar.querySelector('.btn-back').onclick = function () { history.back(); };
      parent.appendChild(topbar);
      timerInt = setInterval(function () {
        const t = document.getElementById('pillTimer');
        if (t && state.activeSession) t.textContent = fmtElapsed(state.activeSession.startTime);
      }, 1000);
    }

    // PR-lista (personrekord). Delas av passummeringen och historik-detaljvyn.
    function appendPRList(parent, prs) {
      if (!prs || prs.length === 0) return;
      const prList = document.createElement('div');
      prList.className = 'pr-list';
      prList.appendChild(el('<div class="pr-list-label">' + prs.length + ' personrekord</div>'));
      prs.forEach(function (p) {
        const detailParts = [];
        if (p.weightPR) detailParts.push('vikt-PR');
        if (p.repPR) detailParts.push('rep-PR');
        const w = (p.vikt !== null && p.vikt !== undefined) ? ' × ' + fmtNum(p.vikt) + ' kg' : ' (kroppsvikt)';
        prList.appendChild(el(
          '<div class="pr-row">' +
            '<div class="pr-name">' + esc(p.övning) + '</div>' +
            '<div class="pr-detail num">' + esc(p.reps) + esc(w) + ' — ' + detailParts.join(', ') + '</div>' +
          '</div>'
        ));
      });
      parent.appendChild(prList);
    }

    function render() {
      if (timerInt) { clearInterval(timerInt); timerInt = null; }
      const app = document.getElementById('app');
      app.innerHTML = '';
      // Modal overlays are appended to <body> for full-viewport coverage.
      // Clear leftovers here so they don't outlive a state.modal = null transition.
      const overlays = document.querySelectorAll('.modal-overlay');
      for (let i = 0; i < overlays.length; i++) overlays[i].remove();
      const view = document.createElement('div');
      view.className = 'view';
      app.appendChild(view);

      if (state.view === 'loading') renderLoadingSkeleton(view);
      else if (state.view === 'error') {
        view.appendChild(el('<div class="error" role="alert">' + esc(state.errorMsg) + '</div>'));
        const b = el('<button class="btn">Försök igen</button>');
        b.onclick = init; view.appendChild(b);
      }
      else if (state.view === 'programList') renderProgramList(view);
      else if (state.view === 'passList') renderPassList(view);
      else if (state.view === 'passDetailIdle') renderPassDetailIdle(view);
      else if (state.view === 'passDetailActive') renderPassDetailActive(view);
      else if (state.view === 'exercise') renderExercise(view);
      else if (state.view === 'passSummary') renderPassSummary(view);
      else if (state.view === 'history') renderHistory(view);
      else if (state.view === 'sessionDetail') renderSessionDetail(view);

      if (state.modal) renderModal();
    }

    function renderModal() {
      const m = state.modal;
      let inputHTML = '';
      if (m.input) {
        const listId = 'modalDatalist';
        const opts = (m.input.datalist || []).map(function (n) { return '<option value="' + esc(n) + '">'; }).join('');
        inputHTML =
          '<input type="text" id="modalInput" autocomplete="off" autocapitalize="words"' +
            (opts ? ' list="' + listId + '"' : '') +
            ' value="' + esc(m.input.value || '') + '"' +
            ' placeholder="' + esc(m.input.placeholder || '') + '" style="width:100%;margin-bottom:18px">' +
          (opts ? '<datalist id="' + listId + '">' + opts + '</datalist>' : '');
      }
      const overlay = el(
        '<div class="modal-overlay">' +
          '<div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1">' +
            '<div class="modal-title" id="modalTitle">' + esc(m.title) + '</div>' +
            '<div class="modal-text">' + esc(m.text) + '</div>' +
            inputHTML +
            '<div class="modal-actions">' +
              '<button class="btn btn-secondary" id="cancel">Tillbaka</button>' +
              '<button class="btn ' + (m.confirmKind === 'danger' ? 'btn-danger' : 'btn-accent') + '" id="confirm">' + esc(m.confirmLabel) + '</button>' +
            '</div>' +
          '</div>' +
        '</div>'
      );
      overlay.querySelector('#cancel').onclick = closeModal;
      const doConfirm = function () {
        if (m.input) {
          const inp = overlay.querySelector('#modalInput');
          const val = inp ? inp.value.trim() : '';
          if (!val) { if (inp) inp.focus(); return; }
          m.onConfirm(val);
        } else {
          m.onConfirm();
        }
      };
      overlay.querySelector('#confirm').onclick = doConfirm;
      overlay.onclick = function (e) { if (e.target === overlay) closeModal(); };
      // Escape stänger; Tab hålls inom dialogen (minimal fokusfälla).
      overlay.onkeydown = function (e) {
        if (e.key === 'Escape') { e.preventDefault(); closeModal(); return; }
        if (e.key === 'Tab') {
          const focusables = overlay.querySelectorAll('button, input');
          if (!focusables.length) return;
          const first = focusables[0], last = focusables[focusables.length - 1];
          if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
          else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      };
      document.body.appendChild(overlay);
      if (m.input) {
        const inp = overlay.querySelector('#modalInput');
        if (inp) {
          inp.focus();
          inp.onkeydown = function (e) { if (e.key === 'Enter') { e.preventDefault(); doConfirm(); } };
        }
      } else {
        // Fokus på dialogen (inte bekräfta-knappen) — titeln annonseras och
        // farliga åtgärder kan inte råka bekräftas med ett oavsiktligt Enter.
        overlay.querySelector('.modal').focus();
      }
    }

    // Byt aktivt program: hämtar programmets pass + statistik och går till passlistan.
    function selectProgram(name) {
      // Redan aktivt och inläst → hoppa direkt in.
      if (name === state.activeProgram && state.program) {
        state.view = 'passList'; render(); return;
      }
      state.switchingProgram = name;
      render();
      google.script.run
        .withSuccessHandler(function (d) {
          state.switchingProgram = null;
          state.activeProgram = d.activeProgram || name;
          state.program = d.program || [];
          state.weeks = d.weeks || [1];
          state.currentWeek = d.currentWeek || 1;
          const st = d.listStats || {};
          state.passLastDate = st.lastDateByPass || {};
          state.weekDoneByPass = st.weekDoneByPass || null;
          state.weekVolume = st.weekVolume || 0;
          state.weekStart = st.weekStart || '';
          state.activeSession = d.activeSession || null;
          // Per-program-cachar gäller bara ett program i taget — nollställ vid byte.
          state.lastSessionByPass = {};
          state.exerciseHistoryByPass = {};
          state.history = undefined;
          if (state.activeSession && state.activeSession.pass) {
            const idx = passIdxByName(state.activeSession.pass);
            state.completedByPassId[state.activeSession.passId] = d.completedSets || state.completedByPassId[state.activeSession.passId] || {};
            if (idx >= 0) { state.selectedPassIdx = idx; state.view = 'passDetailActive'; render(); return; }
          }
          state.view = 'passList';
          render();
        })
        .withFailureHandler(function (err) {
          state.switchingProgram = null;
          toast('Kunde inte byta program: ' + (err && err.message ? err.message : err), 'error');
          render();
        })
        .setActiveProgram(name);
    }

    // Byt programvecka (vecko-progression). Hämtar vald veckas målvikter/reps.
    function changeWeek(week) {
      if (state.changingWeek || week === state.currentWeek) return;
      state.changingWeek = true;
      render();
      google.script.run
        .withSuccessHandler(function (d) {
          state.changingWeek = false;
          state.currentWeek = d.week || week;
          if (d.weeks) state.weeks = d.weeks;
          state.program = d.program || state.program;
          if (d.listStats) {
            state.passLastDate = d.listStats.lastDateByPass || {};
            state.weekDoneByPass = d.listStats.weekDoneByPass || null;
            state.weekVolume = d.listStats.weekVolume || 0;
            state.weekStart = d.listStats.weekStart || '';
          }
          render();
        })
        .withFailureHandler(function (err) {
          state.changingWeek = false;
          toast('Kunde inte byta vecka: ' + (err && err.message ? err.message : err), 'error');
          render();
        })
        .setCurrentWeek(state.activeProgram, week);
    }

    function renderProgramList(parent) {
      parent.appendChild(el(
        '<div class="screen-head">' +
          '<div class="eyebrow dim">SwoleSheet</div>' +
          '<div class="screen-title">Dina program</div>' +
        '</div>'
      ));

      if (!state.programs || state.programs.length === 0) {
        parent.appendChild(el(
          '<div class="stat-card"><div class="empty" style="margin-top:0">' +
          'Inga program hittades. Lägg till en flik som heter <strong>Program</strong> eller <strong>Program: Namn</strong> i kalkylbladet.' +
          '</div></div>'
        ));
        return;
      }

      state.programs.forEach(function (p) {
        const isActive = p.name === state.activeProgram;
        const hasSession = state.activeSession && state.activeSession.program === p.name;
        const meta = (p.passCount || 0) + ' pass';
        const loading = state.switchingProgram === p.name;

        let topRight;
        if (hasSession) topRight = '<span class="mini-pill"><span class="dot"></span><span class="txt">Pågår</span></span>';
        else if (isActive) topRight = '<span class="pcard-tag green">Aktivt</span>';
        else topRight = '<span class="pcard-tag">Program</span>';

        const card = el(
          '<div class="pcard' + (isActive || hasSession ? ' today' : ' upcoming') + '">' +
            '<div class="pcard-edge"></div>' +
            '<div class="pcard-body">' +
              '<div class="pcard-top">' +
                '<span class="pcard-eyebrow">' + (loading ? 'Öppnar…' : esc(meta)) + '</span>' +
                topRight +
              '</div>' +
              '<div class="pcard-title">' + esc(p.name) + '</div>' +
              '<div class="pcard-cta-row"><span class="pcard-sub" style="margin-top:0">' + esc(meta) + '</span><span class="pcard-cta">Öppna →</span></div>' +
            '</div>' +
          '</div>'
        );
        makeActionable(card, function () { if (!state.switchingProgram) selectProgram(p.name); });
        parent.appendChild(card);
      });
    }

    function renderPassList(parent) {
      const weekNr = isoWeekNum(state.todayStr);
      parent.appendChild(el('<div class="ghost-num" aria-hidden="true" style="top:6px">' + weekNr + '</div>'));
      // Tillbaka till programlistan (visas bara när det finns fler än ett program).
      if (state.programs && state.programs.length > 1) {
        const back = el('<button class="btn-back">‹ Dina program</button>');
        back.onclick = function () { history.back(); };
        parent.appendChild(back);
      }
      parent.appendChild(el(
        '<div class="screen-head"' + (state.programs && state.programs.length > 1 ? ' style="margin-top:10px"' : '') + '>' +
          '<div class="eyebrow dim">Vecka ' + weekNr + ' · ' + esc(fmtWeekRange(weekStartStr())) + '</div>' +
          '<div class="screen-title">Veckans pass</div>' +
        '</div>'
      ));

      // Veckoväljare för program med vecko-progression (visas bara när >1 vecka).
      if (state.weeks && state.weeks.length > 1) {
        const wIdx = state.weeks.indexOf(state.currentWeek);
        const lastWk = state.weeks[state.weeks.length - 1];
        const btn = 'background:none;border:1px solid rgba(255,255,255,.18);color:#fff;width:44px;height:44px;border-radius:9px;font-size:20px;line-height:1;cursor:pointer;';
        const wkCard = el(
          '<div class="stat-card">' +
            '<div class="stat-card-row" style="align-items:center">' +
              '<button id="wkPrev" aria-label="Föregående programvecka" style="' + btn + (wIdx <= 0 ? 'opacity:.25;cursor:default;' : '') + '"' + (wIdx <= 0 ? ' disabled' : '') + '>‹</button>' +
              '<span class="stat-card-label">Programvecka ' + esc(String(state.currentWeek)) + ' / ' + esc(String(lastWk)) + (state.changingWeek ? ' …' : '') + '</span>' +
              '<button id="wkNext" aria-label="Nästa programvecka" style="' + btn + (wIdx >= state.weeks.length - 1 ? 'opacity:.25;cursor:default;' : '') + '"' + (wIdx >= state.weeks.length - 1 ? ' disabled' : '') + '>›</button>' +
            '</div>' +
          '</div>'
        );
        wkCard.querySelector('#wkPrev').onclick = function () { if (wIdx > 0) changeWeek(state.weeks[wIdx - 1]); };
        wkCard.querySelector('#wkNext').onclick = function () { if (wIdx < state.weeks.length - 1) changeWeek(state.weeks[wIdx + 1]); };
        parent.appendChild(wkCard);
      }

      // Veckoprogress: pass klara denna vecka + loggad volym
      const doneCount = state.program.filter(function (p) { return isDoneThisWeek(p.pass); }).length;
      let segs = '';
      state.program.forEach(function (p) {
        segs += '<span class="seg' + (isDoneThisWeek(p.pass) ? ' on' : '') + '"></span>';
      });
      parent.appendChild(el(
        '<div class="stat-card">' +
          '<div class="stat-card-row">' +
            '<span class="stat-card-label">' + doneCount + ' av ' + state.program.length + ' pass klara</span>' +
            (state.weekVolume > 0 ? '<span class="stat-card-value num">' + esc(fmtVolume(state.weekVolume)) + ' kg</span>' : '') +
          '</div>' +
          '<div class="seg-bar" aria-hidden="true">' + segs + '</div>' +
        '</div>'
      ));

      state.program.forEach(function (p, idx) {
        const lastDate = state.passLastDate[p.pass];
        const totalSets = p.exercises.reduce(function (s, ex) { return s + ex.set; }, 0);
        const isActive = state.activeSession && state.activeSession.pass === p.pass;
        const meta = p.exercises.length + ' övningar · ' + totalSets + ' set';
        const senast = lastDate ? 'Senast · ' + esc(fmtDateMini(lastDate)) : 'Aldrig kört';

        let cls = '', topRight, body;
        if (isActive) {
          cls = ' today';
          topRight = '<span class="mini-pill"><span class="dot"></span><span class="txt">Pågår</span></span>';
          body = '<div class="pcard-cta-row"><span class="pcard-sub" style="margin-top:0">' + meta + '</span><span class="pcard-cta">Fortsätt →</span></div>';
        } else if (isDoneThisWeek(p.pass)) {
          topRight = '<span class="pcard-tag green">✓ Klart</span>';
          body = '<div class="pcard-sub">' + meta + '</div>';
        } else {
          cls = ' upcoming';
          topRight = '<span class="pcard-tag">Kommande</span>';
          body = '<div class="pcard-sub">' + meta + '</div>';
        }

        const card = el(
          '<div class="pcard' + cls + '">' +
            '<div class="pcard-edge"></div>' +
            '<div class="pcard-body">' +
              '<div class="pcard-top">' +
                '<span class="pcard-eyebrow">' + senast + '</span>' +
                topRight +
              '</div>' +
              '<div class="pcard-title">' + esc(p.pass) + '</div>' +
              body +
            '</div>' +
          '</div>'
        );
        makeActionable(card, function () {
          state.selectedPassIdx = idx;
          if (isActive) state.view = 'passDetailActive';
          else state.view = 'passDetailIdle';
          render();
          if (!isActive) ensureLastSessionLoaded(p.pass);
        });
        parent.appendChild(card);
      });

      const histBtn = el(
        '<button class="hist-link"><span>Historik · Avslutade pass</span><span>›</span></button>'
      );
      histBtn.onclick = function () { openHistory(null, 'passList'); };
      parent.appendChild(histBtn);
    }

    function renderLastSessionCard(parent, pass) {
      const sess = state.lastSessionByPass[pass.pass];

      // null = laddar, false = inga pass, undefined = inte begärt ännu
      if (sess === null || sess === undefined) {
        parent.appendChild(el(skLastStrip()));
        return;
      }

      if (sess === false) {
        // Även pass utan Sessions-rader kan ha legacy-historik (importerade set utan Pass-ID).
        const emptyStrip = el(
          '<div class="last-wrap">' +
            '<button class="last-strip" aria-label="Visa historik">' +
              '<span>Förra gången</span>' +
              '<span class="vals">Inga pass ännu</span>' +
              '<span class="chev" aria-hidden="true">›</span>' +
            '</button>' +
          '</div>'
        );
        emptyStrip.querySelector('.last-strip').onclick = function () { openHistory(pass.pass, 'passDetailIdle'); };
        parent.appendChild(emptyStrip);
        return;
      }

      // Kompakt enrads-sammanfattning: datum · volym · set · min · PR — hela raden
      // öppnar historiken; ✕ tar bort senaste passet.
      let durationMin = null;
      if (sess.startTime && sess.endTime) {
        const m = Math.round((new Date(sess.endTime) - new Date(sess.startTime)) / 60000);
        if (m > 0) durationMin = m;
      }
      const vals = [];
      if (sess.totalVolume > 0) vals.push(esc(fmtVolume(sess.totalVolume)) + ' kg');
      vals.push(sess.totalSets + ' set');
      if (durationMin !== null) vals.push(durationMin + ' min');
      const prPart = sess.prCount > 0 ? '<span class="pr"> · ' + sess.prCount + ' PR</span>' : '';

      const wrap = el(
        '<div class="last-wrap">' +
          '<button class="last-strip" aria-label="Visa historik">' +
            '<span>Förra · ' + esc(fmtDateMini(sess.date)) + '</span>' +
            '<span class="vals num">' + vals.join(' · ') + prPart + '</span>' +
            '<span class="chev" aria-hidden="true">›</span>' +
          '</button>' +
          '<button class="icon-btn danger" title="Ta bort senaste passet" aria-label="Ta bort senaste passet">✕</button>' +
        '</div>'
      );
      wrap.querySelector('.last-strip').onclick = function () { openHistory(pass.pass, 'passDetailIdle'); };
      wrap.querySelector('.icon-btn').onclick = function () {
        showModal(
          'Ta bort senaste passet?',
          'Passet från ' + sess.date + ' samt ' + sess.totalSets + ' loggade set tas bort permanent.',
          'Ta bort', 'danger',
          function () {
            state.modal = null;
            render();
            google.script.run
              .withSuccessHandler(function () {
                toast('Passet togs bort');
                delete state.lastSessionByPass[pass.pass];
                delete state.exerciseHistoryByPass[pass.pass];
                state.history = undefined;
                state.sessionDetailCache = {};
                ensureLastSessionLoaded(pass.pass);
                refreshListStats();
                render();
              })
              .withFailureHandler(function (err) {
                toast('Kunde inte ta bort: ' + (err && err.message ? err.message : err), 'error');
                render();
              })
              .deleteSession(sess.passId);
          }
        );
      };
      parent.appendChild(wrap);
    }

    function renderPassDetailIdle(parent) {
      const pass = state.program[state.selectedPassIdx];
      if (!pass) { state.view = 'passList'; render(); return; }
      if (state.activeSession && state.activeSession.pass === pass.pass) {
        // Shouldn't normally land here, but recover
        state.view = 'passDetailActive'; render(); return;
      }

      const g = passGhost(pass.pass);
      if (g) parent.appendChild(el('<div class="ghost-num" aria-hidden="true">' + g + '</div>'));

      const back = el('<button class="btn-back">‹ Veckans pass</button>');
      back.onclick = function () { history.back(); };
      parent.appendChild(back);

      const lastDate = state.passLastDate[pass.pass];
      const totalSets = pass.exercises.reduce(function (s, ex) { return s + ex.set; }, 0);
      parent.appendChild(el(
        '<div class="screen-head" style="margin-top:10px">' +
          '<div class="eyebrow green">' + (lastDate ? 'Senast · ' + esc(fmtDateMini(lastDate)) : 'Aldrig kört') + '</div>' +
          '<div class="screen-title">' + esc(pass.pass) + '</div>' +
          '<div class="screen-sub">' + pass.exercises.length + ' övningar · ' + totalSets + ' set</div>' +
        '</div>'
      ));

      if (state.activeSession) {
        parent.appendChild(el(
          '<div class="notice"><strong>⚡ ' + esc(state.activeSession.pass) + '</strong> är aktivt (startat ' + esc(fmtTime(state.activeSession.startTime)) + '). Avsluta det innan du startar ett nytt pass.</div>'
        ));
      }

      // Samlad bild av senaste passet — hämtas lazily.
      // Förladda även övningshistoriken så övningsvyn är blixtsnabb om passet startas.
      ensureLastSessionLoaded(pass.pass);
      ensureExerciseHistoryLoaded(pass.pass);
      renderLastSessionCard(parent, pass);

      // Övningar: MÅL (vänster) mot FÖRRA (höger). Förra-platsen renderas alltid —
      // skelett medan historiken laddar, värde eller "–" när den kommit — så att
      // radhöjderna är stabila och inget hoppar när datan landar.
      const sess = state.lastSessionByPass[pass.pass];
      const loadingPrev = (sess === null || sess === undefined);
      const sbe = (sess && sess.setsByExercise) || {};
      const xlist = el('<div class="xlist compact" style="margin-top:4px"' + (loadingPrev ? ' aria-busy="true"' : '') + '>' +
        '<div class="xlist-label xlist-head"><span>Övningar · Mål</span><span>Förra</span></div></div>');
      pass.exercises.forEach(function (ex) {
        const sets = sbe[ex.övning];
        let prevHtml;
        if (loadingPrev) prevHtml = skMask('3×8 @ 70 kg');
        else if (sets && sets.length > 0) prevHtml = esc(compressSets(sets));
        else prevHtml = '–';
        let goals = '';
        exSegments(ex).forEach(function (s) {
          goals += '<div class="xsub num">' + esc(segTarget(s)) +
            (s.notering ? ' <span class="xnote">— ' + esc(s.notering) + '</span>' : '') + '</div>';
        });
        xlist.appendChild(el(
          '<div class="xrow" style="cursor:default">' +
            '<div class="xedge" aria-hidden="true"></div>' +
            '<div class="xmain">' +
              '<div class="xname">' + esc(ex.övning) + '</div>' +
              '<div class="xcols">' +
                '<div class="xcol">' + goals + '</div>' +
                '<div class="xcol xprev">' +
                  '<div class="xsub num xprev-val">' + prevHtml + '</div></div>' +
              '</div>' +
            '</div>' +
          '</div>'
        ));
      });
      parent.appendChild(xlist);

      // Start button
      const startDisabled = !!state.activeSession;
      const startBtn = el(
        '<button class="btn-save glow btn-start-sticky" style="margin-top:16px;height:62px"' + (startDisabled ? ' disabled' : '') + '>' +
          (state.starting ? '<span class="spinner"></span>Startar…' : 'Starta passet →') +
        '</button>'
      );
      if (!startDisabled) {
        startBtn.onclick = function () {
          if (state.starting) return;
          state.starting = true;
          render();
          google.script.run
            .withSuccessHandler(function (sess) {
              state.starting = false;
              state.activeSession = sess;
              state.completedByPassId[sess.passId] = {};
              // Hoppa direkt in i första övningens registrering — minsta väg till att logga.
              // Översikten nås via topbarens "‹ Tillbaka" / "Klar med övning".
              state.selectedExerciseIdx = 0;
              state.currentSetNr = 1;
              state.editingSetNr = null;
              state.view = 'exercise';
              toast('Pass startat', 'success');
              render();
            })
            .withFailureHandler(function (err) {
              state.starting = false;
              toast('Kunde inte starta: ' + (err && err.message ? err.message : err), 'error');
              render();
            })
            .startPass(pass.pass, state.activeProgram);
        };
      }
      parent.appendChild(startBtn);
    }

    function renderPassDetailActive(parent) {
      const pass = state.program[state.selectedPassIdx];
      if (!pass || !state.activeSession) { state.view = 'passList'; render(); return; }
      const passKey = pass.pass;
      ensureExerciseHistoryLoaded(passKey);

      appendSessionTopbar(parent);

      const g = passGhost(passKey);
      if (g) parent.appendChild(el('<div class="ghost-num" aria-hidden="true">' + g + '</div>'));

      parent.appendChild(el(
        '<div class="screen-head" style="margin-top:10px">' +
          '<div class="eyebrow green">' + esc(passKey) + ' · startat ' + esc(fmtTime(state.activeSession.startTime)) + '</div>' +
          '<div class="screen-title">Aktivt pass</div>' +
        '</div>'
      ));

      const exercises = effectiveExercises(pass);

      // Övningsprogress + dagens volym
      let doneEx = 0, doneSets = 0, plannedSets = 0, volume = 0;
      exercises.forEach(function (ex) {
        const done = getCompletedFor(ex.övning);
        plannedSets += ex.set;
        doneSets += Math.min(done.length, ex.set);
        if (ex.set > 0 && done.length >= ex.set) doneEx++;
        done.forEach(function (s) {
          if (s.vikt !== null && s.vikt !== undefined && s.vikt !== '') {
            volume += (Number(s.reps) || 0) * Number(s.vikt);
          }
        });
      });
      const pct = plannedSets > 0 ? Math.min(100, Math.round((doneSets / plannedSets) * 100)) : 0;
      parent.appendChild(el(
        '<div class="stat-card">' +
          '<div class="stat-card-row">' +
            '<span class="stat-card-label">' + doneEx + ' av ' + exercises.length + ' övningar klara</span>' +
            (volume > 0 ? '<span class="stat-card-value num">' + esc(fmtVolume(volume)) + ' kg</span>' : '') +
          '</div>' +
          '<div class="glow-track" aria-hidden="true"><div class="glow-fill" style="width:' + pct + '%"></div></div>' +
        '</div>'
      ));

      // Statusspråk per övning: klart / pågår / nästa / väntar.
      // "Pågår" = påbörjad men inte klar; finns ingen sådan markeras
      // första ologgade som "Nästa" (fri ordning — alla rader klickbara).
      const passHist = state.exerciseHistoryByPass[passKey];
      const statuses = exercises.map(function (ex) {
        const done = getCompletedFor(ex.övning);
        if (ex.set > 0 && done.length >= ex.set) return 'done';
        if (done.length > 0) return 'current';
        return 'waiting';
      });
      if (statuses.indexOf('current') < 0) {
        const i = statuses.indexOf('waiting');
        if (i >= 0) statuses[i] = 'next';
      }

      const xlist = el('<div class="xlist"></div>');
      exercises.forEach(function (ex, idx) {
        const done = getCompletedFor(ex.övning);
        const st = statuses[idx];
        let cls = '', nameExtra = '', sub = '';
        if (ex._subFrom) nameExtra += '<span class="xtag">i st. för ' + esc(ex._subFrom) + '</span>';
        else if (ex._adhoc) nameExtra += '<span class="xtag">Extra</span>';
        if (st === 'done') {
          cls = ' done';
          nameExtra += '<span class="xcheck" aria-hidden="true">✓</span>';
          sub = 'Klart · ' + esc(compressSets(done));
        } else if (st === 'current') {
          cls = ' current';
          nameExtra += '<span class="xtag">Pågår</span>';
          sub = 'Set ' + (done.length + 1) + ' av ' + ex.set + ' · logga →';
        } else {
          const hist = passHist ? (passHist[ex.övning] || []) : null;
          const prevSession = hist
            ? (hist.find(function (s) { return s.datum !== state.activeSession.date; }) || null)
            : null;
          const ref = prevSession
            ? 'förra ' + esc(compressSets(prevSession.sets))
            : 'mål ' + esc(segSummary(ex));
          if (st === 'next') {
            cls = ' current';
            nameExtra += '<span class="xtag">Nästa</span>';
            sub = 'Set 1 av ' + ex.set + ' · logga →';
          } else {
            cls = ' waiting';
            sub = 'Väntar · ' + ref;
          }
        }
        const canEdit = done.length === 0;
        const menuBtn = canEdit ? '<button class="icon-btn xmenu" title="Byt/ta bort övning" aria-label="Byt eller ta bort övning">⋯</button>' : '';
        const row = el(
          '<div class="xrow' + cls + '">' +
            '<div class="xedge"></div>' +
            '<div class="xmain">' +
              '<div class="xname-row"><span class="xname">' + esc(ex.övning) + '</span>' + nameExtra + '</div>' +
              '<div class="xsub num">' + sub + '</div>' +
            '</div>' +
            menuBtn +
            '<span class="xchev" aria-hidden="true">›</span>' +
          '</div>'
        );
        makeActionable(row, function () {
          state.selectedExerciseIdx = idx;
          state.currentSetNr = getCompletedFor(ex.övning).length + 1;
          state.editingSetNr = null;
          state.view = 'exercise';
          render();
        });
        if (canEdit) {
          row.querySelector('.xmenu').onclick = function (e) {
            e.stopPropagation();
            if (ex._adhoc) {
              showModal('Ta bort övning?', ex.övning + ' tas bort från passet.', 'Ta bort', 'danger',
                function () { closeModal(); removeAddedExercise(ex); });
            } else if (ex._subFrom) {
              showModal('Ångra byte?', 'Återgå till ' + ex._subFrom + '.', 'Ångra byte', 'accent',
                function () { closeModal(); undoSubstitute(ex); });
            } else {
              promptSubstitute(ex);
            }
          };
        }
        xlist.appendChild(row);
      });
      parent.appendChild(xlist);

      const addBtn = el('<button class="btn-add-ex">+ Lägg till övning</button>');
      addBtn.onclick = promptAddExercise;
      parent.appendChild(addBtn);

      const endBtn = el(
        '<button class="btn-outline-green">' +
          (state.ending ? '<span class="spinner"></span>Avslutar…' : 'Avsluta passet') +
        '</button>'
      );
      endBtn.onclick = function () {
        if (state.ending) return;
        showModal(
          'Avsluta pass?',
          'Passet markeras som avslutat. Du kan starta ett nytt direkt efter.',
          'Avsluta', 'accent',
          function () {
            state.modal = null;
            state.ending = true;
            render();
            const passId = state.activeSession.passId;
            const startTime = state.activeSession.startTime;

            function showSummary(prs) {
              state.ending = false;
              const data = state.completedByPassId[passId] || {};
              let totalSets = 0, totalVolume = 0;
              Object.keys(data).forEach(function (övning) {
                data[övning].forEach(function (s) {
                  totalSets++;
                  if (s.vikt !== null && s.vikt !== undefined && s.vikt !== '') {
                    totalVolume += (Number(s.reps) || 0) * Number(s.vikt);
                  }
                });
              });
              const durationMin = Math.max(1, Math.floor((new Date() - new Date(startTime)) / 60000));
              state.summary = {
                pass: passKey,
                duration: durationMin,
                totalSets: totalSets,
                totalVolume: totalVolume,
                prs: prs || [],
                endedAt: new Date().toISOString()
              };
              state.activeSession = null;
              delete state.lastSessionByPass[passKey];
              delete state.exerciseHistoryByPass[passKey];
              state.history = undefined;
              state.sessionDetailCache = {};
              state.view = 'passSummary';
              render();
              refreshListStats();
            }

            google.script.run
              .withSuccessHandler(function (r) {
                // Backend kan ha auto-avancerat programveckan (alla pass i veckan klara).
                if (r && r.advancedWeek && r.advancedWeek !== state.currentWeek) {
                  const nw = r.advancedWeek;
                  google.script.run
                    .withSuccessHandler(function (d) {
                      state.currentWeek = d.week || nw;
                      if (d.weeks) state.weeks = d.weeks;
                      state.program = d.program || state.program;
                      if (d.listStats) {
                        state.passLastDate = d.listStats.lastDateByPass || {};
                        state.weekDoneByPass = d.listStats.weekDoneByPass || null;
                        state.weekVolume = d.listStats.weekVolume || 0;
                        state.weekStart = d.listStats.weekStart || '';
                      }
                      toast('Veckan klar — programvecka framflyttad till vecka ' + (d.week || nw), 'success');
                      render();
                    })
                    .withFailureHandler(function (err) {
                      toast('Kunde inte flytta fram programveckan: ' + (err && err.message ? err.message : err), 'error');
                    })
                    .setCurrentWeek(state.activeProgram, nw);
                }
                google.script.run
                  .withSuccessHandler(function (prs) { showSummary(prs); })
                  .withFailureHandler(function () { showSummary([]); })
                  .analyzeSession(passId);
              })
              .withFailureHandler(function (err) {
                state.ending = false;
                toast('Kunde inte avsluta: ' + (err && err.message ? err.message : err), 'error');
                render();
              })
              .endPass(passId);
          }
        );
      };
      parent.appendChild(endBtn);

      // Släng: raderar sessionen + alla loggade set (för test/felstarter)
      const cancelBtn = el(
        '<button class="btn-discard">' +
          (state.canceling ? '<span class="spinner"></span>Slänger…' : 'Släng passet') +
        '</button>'
      );
      cancelBtn.onclick = function () {
        if (state.canceling || state.ending) return;
        const data = state.completedByPassId[state.activeSession.passId] || {};
        let setCount = 0;
        Object.keys(data).forEach(function (övning) { setCount += data[övning].length; });
        showModal(
          'Släng passet?',
          'Passet och ' + setCount + ' loggade set tas bort permanent. Detta går inte att ångra.',
          'Släng passet', 'danger',
          function () {
            state.modal = null;
            state.canceling = true;
            render();
            const passId = state.activeSession.passId;
            google.script.run
              .withSuccessHandler(function () {
                state.canceling = false;
                state.activeSession = null;
                delete state.completedByPassId[passId];
                delete state.lastSessionByPass[passKey];
                delete state.exerciseHistoryByPass[passKey];
                state.history = undefined;
                state.sessionDetailCache = {};
                state.view = 'passList';
                toast('Passet avbröts');
                render();
                refreshListStats();
              })
              .withFailureHandler(function (err) {
                state.canceling = false;
                toast('Kunde inte avbryta: ' + (err && err.message ? err.message : err), 'error');
                render();
              })
              .deleteSession(passId);
          }
        );
      };
      parent.appendChild(cancelBtn);
    }

    function renderExercise(parent) {
      const pass = state.program[state.selectedPassIdx];
      if (!pass || !state.activeSession) { state.view = 'passList'; render(); return; }
      const passKey = pass.pass;
      const ex = effectiveExercises(pass)[state.selectedExerciseIdx];
      if (!ex) { state.view = 'passDetailActive'; render(); return; }

      // Härled aktuellt set-nr från redan loggade set så att det inte kan glida ur fas
      // (t.ex. om webview:n killats vid app-byte och state återställts).
      state.currentSetNr = getCompletedFor(ex.övning).length + 1;

      appendSessionTopbar(parent);

      // Ghost-siffra: aktuellt set, svagt i bakgrunden
      parent.appendChild(el('<div class="ghost-num" aria-hidden="true">' + String(Math.min(state.currentSetNr, 99)).padStart(2, '0') + '</div>'));

      // Segmentet för aktuellt set styr mål/RIR/notering/förifyllning.
      const curSeg = segForSet(ex, state.currentSetNr);
      const setLabel = state.currentSetNr > ex.set
        ? 'Set ' + state.currentSetNr + ' (extra)'
        : 'Set ' + state.currentSetNr + ' av ' + ex.set;
      const målBits = [];
      const harMålvikt = curSeg && curSeg.målvikt !== null && curSeg.målvikt !== undefined && curSeg.målvikt !== '';
      if (curSeg && curSeg.reps !== null && curSeg.reps !== undefined && curSeg.reps !== '') {
        målBits.push('Mål ' + curSeg.reps + (harMålvikt ? ' × ' + fmtNum(curSeg.målvikt) + ' kg' : ''));
      } else if (harMålvikt) {
        målBits.push('Mål ' + fmtNum(curSeg.målvikt) + ' kg');
      }
      if (curSeg && curSeg.rir !== null && curSeg.rir !== undefined && curSeg.rir !== '') målBits.push('RIR ' + curSeg.rir);
      const målPart = målBits.length ? ' · ' + esc(målBits.join(' · ')) : '';
      parent.appendChild(el(
        '<div class="ex-head">' +
          '<div class="ex-title">' + esc(ex.övning) + '</div>' +
          '<div class="ex-meta">' + esc(passKey) + ' — ' + esc(setLabel) + målPart + '</div>' +
        '</div>'
      ));

      if (curSeg && curSeg.notering) parent.appendChild(el('<p class="notering">' + esc(curSeg.notering) + '</p>'));

      // Förra passets session för denna övning — ur den förladdade pass-historiken
      ensureExerciseHistoryLoaded(passKey);
      const passHist = state.exerciseHistoryByPass[passKey];
      const histLoading = passHist === null || passHist === undefined;
      const exHist = histLoading ? [] : (passHist[ex.övning] || []);
      const prevSession = exHist.find(function (s) { return s.datum !== state.activeSession.date; }) || null;
      const completedSets = getCompletedFor(ex.övning);

      // Mål för aktuellt set = samma set från förra passet (används för förifyllning).
      const prevSetForTarget = prevSession && prevSession.sets[state.currentSetNr - 1];

      // FÖRRA | IDAG, set för set — aktivt set speglar inmatningen live
      const grid = document.createElement('div');
      grid.className = 'sg';
      // Tabellsemantik på div-griden så skärmläsare får kolumnkontext per cell.
      grid.setAttribute('role', 'table');
      grid.setAttribute('aria-label', 'Set för ' + ex.övning);
      if (histLoading) {
        grid.setAttribute('aria-busy', 'true');
        grid.appendChild(el(
          '<div class="sg-head" role="row"><span role="columnheader" aria-label="Set"></span>' +
            '<span class="h-prev" role="columnheader">' + skBar('70%', '0.7rem') + '</span>' +
            '<span class="h-mal" role="columnheader">Mål</span>' +
            '<span class="h-today" role="columnheader">Idag</span>' +
          '</div>'
        ));
        const skRowCount = Math.max(ex.set || 3, 3);
        for (let i = 0; i < skRowCount; i++) {
          grid.appendChild(el(
            '<div class="sg-row" aria-hidden="true">' +
              '<div class="sg-setcell">' + skBar('60%', '1rem') + '</div>' +
              '<div>' + skBar('70%', '1rem') + '</div>' +
              '<div>' + skBar('70%', '1rem') + '</div>' +
              '<div>' + skBar('70%', '1rem') + '</div>' +
            '</div>'
          ));
        }
      } else {
        const prevSets = (prevSession && prevSession.sets) || [];
        let rowCount = Math.max(ex.set, prevSets.length, completedSets.length);
        if (state.currentSetNr > rowCount) rowCount = state.currentSetNr;
        // Veckans föreskrivna mål (per set-segment) — egen MÅL-kolumn så man ser
        // dagens vikt rad för rad, inte bara förra passets.
        const programMålFor = function (setNr) {
          const s = segForSet(ex, setNr);
          return esc(s.reps) + (s.målvikt !== null && s.målvikt !== undefined && s.målvikt !== '' ? ' × ' + esc(fmtNum(s.målvikt)) : '');
        };
        grid.appendChild(el(
          '<div class="sg-head" role="row">' +
            '<span role="columnheader" aria-label="Set"></span>' +
            '<span class="h-prev" role="columnheader">' + (prevSession ? 'Förra · ' + esc(fmtDateMini(prevSession.datum)) : 'Förra') + '</span>' +
            '<span class="h-mal" role="columnheader">Mål</span>' +
            '<span class="h-today" role="columnheader">Idag</span>' +
          '</div>'
        ));
        for (let i = 0; i < rowCount; i++) {
          const setNr = i + 1;
          const pSet = prevSets[i];
          const dSet = completedSets[i];
          const prevStr = pSet ? esc(fmtSetShort(pSet)) : '–';
          const malStr = programMålFor(setNr) || '–';
          let rowCls = '';
          let setCell = '<span class="sg-setlbl">SET ' + setNr + '</span>';
          let todayStr = '–';
          const editingThis = dSet && state.editingSetNr === setNr;
          if (editingThis) {
            rowCls = ' active editing';
            setCell += '<span class="sg-tag">Redigerar</span>';
            todayStr = '<span id="sgLive">–</span>';
          } else if (dSet) {
            rowCls = ' done editable';
            const prHTML = (dSet.pr && (dSet.pr.weightPR || dSet.pr.repPR)) ? '<span class="pr-pill">PR</span>' : '';
            todayStr = '<span class="sg-check" aria-hidden="true">✓</span><span>' + esc(fmtSetShort(dSet)) + '</span>' + prHTML + '<span class="sg-edit" aria-hidden="true">✎</span>';
          } else if (setNr === state.currentSetNr && state.editingSetNr === null) {
            rowCls = ' active';
            setCell += '<span class="sg-tag">' + (setNr > ex.set ? 'Extra' : 'Pågår') + '</span>';
            todayStr = '<span id="sgLive">–</span>';
          }
          const rowEl = el(
            '<div class="sg-row' + rowCls + '" role="row">' +
              '<span class="sg-setcell" role="cell">' + setCell + '</span>' +
              '<span class="sg-prev num" role="cell">' + prevStr + '</span>' +
              '<span class="sg-mal num" role="cell">' + malStr + '</span>' +
              '<span class="sg-today num" role="cell">' + todayStr + '</span>' +
            '</div>'
          );
          if (dSet && !editingThis) {
            // Behåll rad-rollen (tabellsemantik) men gör raden fokuserbar och
            // aktiverbar med Enter/Space — öppnar redigering av loggat set.
            const startEdit = function () { state.editingSetNr = setNr; render(); };
            rowEl.setAttribute('tabindex', '0');
            rowEl.setAttribute('title', 'Redigera set ' + setNr);
            rowEl.onclick = startEdit;
            rowEl.onkeydown = function (e) {
              if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startEdit(); }
            };
          }
          grid.appendChild(rowEl);
          if (dSet && dSet.kommentar) {
            grid.appendChild(el(
              '<div class="sg-comment"><span class="pen" aria-hidden="true">✎</span><span class="txt">”' + esc(dSet.kommentar) + '”</span></div>'
            ));
          }
        }
        // Totalvolym (reps × vikt; kroppsvikt räknas som 1) — slog du förra passet totalt?
        const prevTotal = sessionScore(prevSets);
        const curTotal = sessionScore(completedSets);
        if (prevTotal > 0 || curTotal > 0) {
          const hasWeight = prevSets.concat(completedSets).some(function (s) {
            return s.vikt !== null && s.vikt !== undefined && s.vikt !== '';
          });
          const unit = hasWeight ? ' kg' : '';
          const totTrend = (prevTotal > 0 && curTotal > 0) ? trendHTML(curTotal, prevTotal) : '';
          grid.appendChild(el(
            '<div class="sg-row sg-total" role="row">' +
              '<span class="sg-setlbl" role="cell">Totalt</span>' +
              '<span class="sg-prev num" role="cell">' + (prevTotal > 0 ? esc(fmtVolume(prevTotal)) + unit : '–') + '</span>' +
              '<span class="sg-mal num" role="cell">&nbsp;</span>' +
              '<span class="sg-today num" role="cell">' + (curTotal > 0 ? esc(fmtVolume(curTotal)) + unit + totTrend : '–') + '</span>' +
            '</div>'
          ));
        }
      }
      parent.appendChild(grid);

      // Registrering / redigering. Redigerar man ett loggat set förifylls dess värden;
      // annars förifylls nästa set med målet (förra passets set), annars senast loggade/programmet.
      const editSet = state.editingSetNr != null
        ? completedSets.find(function (s) { return s.setNr === state.editingSetNr; })
        : null;
      const editing = !!editSet;
      const editNr = editing ? state.editingSetNr : null;
      const lastDone = completedSets[completedSets.length - 1];

      // Förifyllning för nytt set: veckans föreskrivna mål styr (progression). Faller
      // tillbaka på förra passet → senast loggade när veckans mål saknas (t.ex.
      // kroppsviktsövning utan målvikt, eller reps-intervall utan siffra).
      let defaultReps = '';
      if (editing) {
        if (editSet.reps !== undefined && editSet.reps !== null) defaultReps = editSet.reps;
      } else {
        const målReps = curSeg ? firstRepNum(curSeg.reps) : '';
        if (målReps !== '') defaultReps = målReps;
        else if (prevSetForTarget && prevSetForTarget.reps !== undefined && prevSetForTarget.reps !== null) defaultReps = prevSetForTarget.reps;
        else if (lastDone && lastDone.reps !== undefined && lastDone.reps !== null) defaultReps = lastDone.reps;
      }

      let defaultVikt = '';
      if (editing) {
        if (editSet.vikt !== undefined && editSet.vikt !== null) defaultVikt = fmtNum(editSet.vikt);
      } else if (curSeg && curSeg.målvikt !== null && curSeg.målvikt !== undefined && curSeg.målvikt !== '') defaultVikt = fmtNum(curSeg.målvikt);
      else if (prevSetForTarget && prevSetForTarget.vikt !== undefined && prevSetForTarget.vikt !== null) defaultVikt = fmtNum(prevSetForTarget.vikt);
      else if (lastDone && lastDone.vikt !== undefined && lastDone.vikt !== null) defaultVikt = fmtNum(lastDone.vikt);

      const defaultKomm = editing ? (editSet.kommentar || '') : '';

      const regTitle = (editing ? 'Redigera set ' : 'Registrera set ') + (editing ? editNr : state.currentSetNr);
      const saveLabel = editing ? 'Uppdatera set ' + editNr : 'Spara set ' + state.currentSetNr + ' →';
      const saveGlow = (!editing && completedSets.length > 0) ? ' glow' : '';
      const showDoneBtn = !editing && completedSets.length > 0;
      const reg = el(
        '<div class="reg">' +
          '<div class="reg-head">' +
            '<span class="reg-title">' + esc(regTitle) + '</span>' +
            '<span class="reg-hint">' + (editing ? 'Ändra & uppdatera' : 'Skriv eller ±') + '</span>' +
          '</div>' +
        '</div>'
      );
      const form = el(
        '<form>' +
          '<div class="w-row">' +
            '<button type="button" class="step-btn" id="wDn" aria-label="Minska vikt 2,5 kg">–</button>' +
            '<div class="w-input-wrap">' +
              '<input id="vikt" class="w-input" inputmode="decimal" maxlength="6" value="' + esc(defaultVikt) + '" placeholder="–" title="Vikt (kg) — tomt = kroppsvikt" aria-label="Vikt i kilogram (tomt = kroppsvikt)">' +
              '<span class="w-unit" aria-hidden="true">kg</span>' +
            '</div>' +
            '<button type="button" class="step-btn plus" id="wUp" aria-label="Öka vikt 2,5 kg">+</button>' +
          '</div>' +
          '<div class="r-row">' +
            '<span class="r-label" id="repsLabel">Reps</span>' +
            '<button type="button" class="step-btn sm" id="rDn" aria-label="Minska reps">–</button>' +
            '<input id="reps" class="r-input" inputmode="numeric" maxlength="3" value="' + esc(defaultReps) + '" aria-labelledby="repsLabel">' +
            '<button type="button" class="step-btn sm plus" id="rUp" aria-label="Öka reps">+</button>' +
          '</div>' +
          '<div class="c-row">' +
            '<span class="pen" aria-hidden="true">✎</span>' +
            '<input id="komm" class="c-input" value="' + esc(defaultKomm) + '" placeholder="Kommentar (valfri) — t.ex. RPE, känsla …" aria-label="Kommentar (valfri)">' +
          '</div>' +
          '<button type="submit" class="btn-save' + saveGlow + '" id="save">' + esc(saveLabel) + '</button>' +
          (editing ? '<button type="button" class="btn btn-secondary" id="cancelEdit" style="margin-top:8px">Avbryt redigering</button>' : '') +
          (editing ? '<button type="button" class="btn-discard" id="deleteSet">Ta bort set ' + editNr + '</button>' : '') +
          (showDoneBtn ? '<button type="button" class="btn btn-secondary" id="done" style="margin-top:8px">Klar med övning</button>' : '') +
        '</form>'
      );

      const viktInp = form.querySelector('#vikt');
      const repsInp = form.querySelector('#reps');

      function updateLive() {
        const lv = document.getElementById('sgLive');
        if (!lv) return;
        const r = repsInp.value.trim();
        const v = viktInp.value.trim();
        lv.textContent = (r === '' ? '–' : r) + (v === '' ? '' : ' × ' + v);
      }
      function stepInput(inp, d, min) {
        const cur = parseNum(inp.value);
        const base = cur === null ? 0 : cur;
        let next = +(base + d).toFixed(2);
        if (next < min) next = min;
        inp.value = fmtNum(next);
        updateLive();
      }
      viktInp.oninput = updateLive;
      repsInp.oninput = updateLive;
      form.querySelector('#wDn').onclick = function () { stepInput(viktInp, -2.5, 0); };
      form.querySelector('#wUp').onclick = function () { stepInput(viktInp, 2.5, 0); };
      form.querySelector('#rDn').onclick = function () { stepInput(repsInp, -1, 1); };
      form.querySelector('#rUp').onclick = function () { stepInput(repsInp, 1, 1); };

      form.onsubmit = function (e) {
        e.preventDefault();
        if (state.saving) return;
        const reps = parseNum(repsInp.value);
        const vikt = parseNum(viktInp.value);
        const komm = form.querySelector('#komm').value.trim();
        if (reps === null) { toast('Ange reps', 'error'); return; }

        state.saving = true;
        const saveBtn = form.querySelector('#save');
        saveBtn.disabled = true;
        saveBtn.innerHTML = '<span class="spinner"></span>' + (editing ? 'Uppdaterar…' : 'Sparar…');

        const id = state.activeSession.passId;

        if (editing) {
          // Uppdatera befintligt set. PR nollställs lokalt — rätt PR räknas om
          // auktoritativt i analyzeSession(passId) vid avsluta.
          google.script.run
            .withSuccessHandler(function () {
              state.saving = false;
              const data = state.completedByPassId[id] || {};
              const arr = data[ex.övning] || [];
              const target = arr.find(function (s) { return s.setNr === editNr; });
              if (target) { target.reps = reps; target.vikt = vikt; target.kommentar = komm; target.pr = null; }
              state.editingSetNr = null;
              render();
            })
            .withFailureHandler(function (err) {
              state.saving = false;
              saveBtn.disabled = false;
              saveBtn.textContent = 'Uppdatera set ' + editNr;
              toast('Kunde inte uppdatera: ' + (err && err.message ? err.message : err), 'error');
            })
            .updateSet({
              passId: state.activeSession.passId,
              övning: ex.övning,
              setNr: editNr,
              reps: reps, vikt: vikt, kommentar: komm
            });
          return;
        }

        // Härled setNr från befintliga set i stället för state.currentSetNr — så slipper vi
        // skicka fel nummer om state hunnit gå ur fas (t.ex. efter app-byte).
        const setNr = getCompletedFor(ex.övning).length + 1;

        const entry = {
          datum: state.activeSession.date,
          pass: passKey,
          övning: ex.övning,
          setNr: setNr,
          reps: reps, vikt: vikt, kommentar: komm,
          passId: state.activeSession.passId,
          program: state.activeSession.program || state.activeProgram
        };

        google.script.run
          .withSuccessHandler(function (response) {
            state.saving = false;
            if (!state.completedByPassId[id]) state.completedByPassId[id] = {};
            const data = state.completedByPassId[id];
            if (!data[ex.övning]) data[ex.övning] = [];
            const pr = response && response.pr ? response.pr : null;
            data[ex.övning].push({ setNr: setNr, reps: reps, vikt: vikt, kommentar: komm, pr: pr });

            // PR visas inline som grön PR-pill på set-raden + i passummeringen;
            // ingen separat toast (kändes malplacerad designmässigt).

            // currentSetNr härleds i renderExercise från completed-set;
            // ingen auto-navigering — användaren bestämmer själv när övningen är klar.
            render();
          })
          .withFailureHandler(function (err) {
            state.saving = false;
            saveBtn.disabled = false;
            saveBtn.textContent = 'Spara set ' + state.currentSetNr + ' →';
            toast('Fel: ' + (err && err.message ? err.message : err), 'error');
          })
          .logSet(entry);
      };

      const cancelEditBtn = form.querySelector('#cancelEdit');
      if (cancelEditBtn) cancelEditBtn.onclick = function () { state.editingSetNr = null; render(); };

      const deleteSetBtn = form.querySelector('#deleteSet');
      if (deleteSetBtn) deleteSetBtn.onclick = function () {
        const delNr = editNr;
        showModal(
          'Ta bort set ' + delNr + '?',
          'Set ' + delNr + ' i ' + ex.övning + ' tas bort permanent. Efterföljande set numreras om.',
          'Ta bort', 'danger',
          function () {
            state.modal = null;
            render();
            const id = state.activeSession.passId;
            google.script.run
              .withSuccessHandler(function () {
                const data = state.completedByPassId[id] || {};
                let arr = data[ex.övning] || [];
                arr = arr.filter(function (s) { return s.setNr !== delNr; });
                arr.forEach(function (s) { if (s.setNr > delNr) s.setNr -= 1; });
                data[ex.övning] = arr;
