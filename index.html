<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B0C0E">
  <meta name="color-scheme" content="dark">
  <title>SwoleSheet</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="icon" href="icon-192-v4.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192-v4.png">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0B0C0E; }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; visibility: hidden; }
    iframe.ready { visibility: visible; }
    #boot {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 24px; text-align: center; box-sizing: border-box;
      background: #0B0C0E; color: #E8E9EB;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #boot[hidden] { display: none; }
    #boot h1 { margin: 0; font-size: 22px; font-weight: 700; }
    #boot p { margin: 0; max-width: 320px; font-size: 15px; line-height: 1.5; color: #9BA0A8; }
    #boot button {
      border: 0; border-radius: 12px; padding: 14px 28px; font-size: 16px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    #openBtn { background: #E8E9EB; color: #0B0C0E; }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid #2A2D33; border-top-color: #E8E9EB;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* loading: bara spinnern; open: text + knapp */
    [data-mode="loading"] h1, [data-mode="loading"] p, [data-mode="loading"] button { display: none; }
    [data-mode="open"] .spinner { display: none; }
  </style>
</head>
<body>
  <div id="boot" data-mode="loading">
    <div class="spinner"></div>
    <h1>SwoleSheet</h1>
    <p>Appen kunde inte laddas inbäddad — öppna den direkt nedan (logga in där om du blir tillfrågad). Vill du installera appen? Gör det via webbläsarens meny (Lägg till på startskärmen) innan du öppnar.</p>
    <button id="openBtn" type="button">Öppna SwoleSheet</button>
  </div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    const EXEC_URL = 'https://script.google.com/macros/s/AKfycbzea4Z6Nzkz3SecXaHU4lFQHLIKHv-3Kb4aqmmrXboybmXRx-mqf_sGbf0NnahKwnfS/exec';
    // Inbäddat läge (iframe) är förstahandsvalet — det döljer Apps Script-bannern
    // och Androids flikrubrik. Misslyckas det (utloggad, eller tredjeparts-cookies
    // blockerade) faller vi tillbaka till direktläge och minns misslyckandet i
    // 24 h så starter under tiden slipper vänta på timeouten.
    const FAILED_KEY = 'swolesheet-embed-failed-at';
    const RETRY_AFTER_MS = 24 * 3600 * 1000;
    const boot = document.getElementById('boot');
    // Auto-hoppet gäller bara i installerad app (standalone) — i en vanlig
    // webbläsarflik skulle det hinna före både installations-popup och meny.
    const isStandalone = matchMedia('(display-mode: standalone)').matches
      || navigator.standalone === true;
    const failedAt = Number(localStorage.getItem(FAILED_KEY) || 0);
    const recentFailure = failedAt && (Date.now() - failedAt) < RETRY_AFTER_MS;
    // ?embed i adressen tvingar ett inbäddningsförsök trots färskt misslyckande —
    // diagnosväg för att skilja cache/flagga från äkta cookie-blockering.
    const forceEmbed = new URLSearchParams(location.search).has('embed');

    if (recentFailure && !forceEmbed) {
      goDirect();
    } else {
      // Kortare timeout när inbäddat läge nyligen strulat men 24 h passerat —
      // värt ett nytt försök, men inte en lång väntan.
      initEmbedded(failedAt ? 5000 : 8000);
    }

    function goDirect() {
      if (isStandalone) {
        location.replace(EXEC_URL);
      } else {
        boot.dataset.mode = 'open';
        document.getElementById('openBtn').addEventListener('click', function () {
          location.href = EXEC_URL;
        });
      }
    }

    function initEmbedded(timeoutMs) {
      // Appen (JavaScript.html) postar 'swolesheet:ready' till window.top när den
      // laddat. Uteblir signalen har iframen fastnat på Googles inloggnings-
      // redirect; iframen hålls dold tills signalen kommit så felsidan aldrig syns.
      const appFrame = document.createElement('iframe');
      appFrame.allow = 'clipboard-write';
      appFrame.src = EXEC_URL;
      document.body.appendChild(appFrame);
      let appReady = false;
      const timer = setTimeout(onTimeout, timeoutMs);

      window.addEventListener('message', function (e) {
        if (e.data !== 'swolesheet:ready') return;
        appReady = true;
        clearTimeout(timer);
        localStorage.removeItem(FAILED_KEY);
        appFrame.classList.add('ready');
        boot.hidden = true;
      });

      function onTimeout() {
        if (appReady) return;
        localStorage.setItem(FAILED_KEY, String(Date.now()));
        goDirect();
      }
    }
  </script>
</body>
</html>
