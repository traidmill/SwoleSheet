<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B0C0E">
  <meta name="color-scheme" content="dark">
  <title>SwoleSheet</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="icon" href="icon-192-v4.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192-v4.png">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0B0C0E; }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; visibility: hidden; }
    iframe.ready { visibility: visible; }
    #boot {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; padding: 24px; text-align: center; box-sizing: border-box;
      background: #0B0C0E; color: #E8E9EB;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #boot[hidden] { display: none; }
    #boot h1 { margin: 0; font-size: 22px; font-weight: 700; }
    #boot p { margin: 0; max-width: 320px; font-size: 15px; line-height: 1.5; color: #9BA0A8; }
    #boot button {
      border: 0; border-radius: 12px; padding: 14px 28px; font-size: 16px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    #loginBtn, #openBtn { background: #E8E9EB; color: #0B0C0E; }
    #retryBtn { background: transparent; color: #9BA0A8; text-decoration: underline; padding: 8px; font-weight: 400; font-size: 14px; }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid #2A2D33; border-top-color: #E8E9EB;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* loading: bara spinnern; login/open: text + relevanta knappar */
    [data-mode="loading"] h1, [data-mode="loading"] p, [data-mode="loading"] button { display: none; }
    [data-mode="login"] .spinner, [data-mode="login"] .open-only { display: none; }
    [data-mode="open"] .spinner, [data-mode="open"] .login-only { display: none; }
  </style>
</head>
<body>
  <div id="boot" data-mode="loading">
    <div class="spinner"></div>
    <h1 class="login-only">Kunde inte ladda SwoleSheet</h1>
    <p class="login-only">Troligen har Google loggat ut dig. Tryck nedan så öppnas appen direkt med inloggning — SwoleSheet kommer ihåg det här läget till nästa gång.</p>
    <button id="loginBtn" class="login-only" type="button">Logga in med Google</button>
    <button id="retryBtn" class="login-only" type="button">Försök igen</button>
    <h1 class="open-only">SwoleSheet</h1>
    <p class="open-only">Vill du installera appen? Gör det via webbläsarens meny (Lägg till på startskärmen) innan du öppnar.</p>
    <button id="openBtn" class="open-only" type="button">Öppna SwoleSheet</button>
  </div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    const EXEC_URL = 'https://script.google.com/macros/s/AKfycbzea4Z6Nzkz3SecXaHU4lFQHLIKHv-3Kb4aqmmrXboybmXRx-mqf_sGbf0NnahKwnfS/exec';
    // Enheter som blockerar tredjeparts-cookies kan aldrig autentisera i iframen.
    // När det upptäckts en gång går alla framtida starter direkt till appen
    // (förstapartsläge) utan väntetid.
    const DIRECT_KEY = 'swolesheet-direct-mode';
    // Auto-hoppet gäller bara i installerad app (standalone) — i en vanlig
    // webbläsarflik skulle det hinna före både installations-popup och meny.
    const isStandalone = matchMedia('(display-mode: standalone)').matches
      || navigator.standalone === true;
    if (localStorage.getItem(DIRECT_KEY)) {
      if (isStandalone) {
        location.replace(EXEC_URL);
      } else {
        document.getElementById('boot').dataset.mode = 'open';
        document.getElementById('openBtn').addEventListener('click', function () {
          location.href = EXEC_URL;
        });
      }
    } else {
      initEmbedded();
    }

    function initEmbedded() {
      // Appen (JavaScript.html) postar 'swolesheet:ready' till window.top när den
      // laddat. Uteblir signalen har iframen fastnat på Googles inloggnings-
      // redirect; iframen hålls dold tills signalen kommit så felsidan aldrig syns.
      const READY_TIMEOUT_MS = 8000;
      const boot = document.getElementById('boot');
      const appFrame = document.createElement('iframe');
      appFrame.allow = 'clipboard-write';
      appFrame.src = EXEC_URL;
      document.body.appendChild(appFrame);
      let appReady = false;
      let timer = setTimeout(showLogin, READY_TIMEOUT_MS);

      window.addEventListener('message', function (e) {
        if (e.data !== 'swolesheet:ready') return;
        appReady = true;
        clearTimeout(timer);
        appFrame.classList.add('ready');
        boot.hidden = true;
      });

      function showLogin() {
        if (appReady) return;
        boot.dataset.mode = 'login';
        boot.hidden = false;
      }

      function retry() {
        if (appReady) return;
        boot.dataset.mode = 'loading';
        clearTimeout(timer);
        timer = setTimeout(showLogin, READY_TIMEOUT_MS);
        appFrame.src = EXEC_URL;
      }

      document.getElementById('loginBtn').addEventListener('click', function () {
        localStorage.setItem(DIRECT_KEY, '1');
        location.href = EXEC_URL;
      });
      document.getElementById('retryBtn').addEventListener('click', retry);
    }
  </script>
</body>
</html>
